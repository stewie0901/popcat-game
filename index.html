<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>POPCAT CLASSIC</title>
    <style>
        /* [x] body box 編距為0 */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            /* [x] 字型 sans-serif */
            font-family: sans-serif;
        }

        .container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #bdaa90;
            /* [x] 防止文字被選取 */
            user-select: none;
            -webkit-user-select: none;
        }

        /* [x] 標題 box 最大寬度 600px */
        .title {
            width: 80%;
            max-width: 600px;
            margin-top: 2em;
        }

        /* [x] 文字 div 排版填滿剩餘空間 */
        /* [x] 文字 box 最大寬度 800px */
        .cat-img {
            flex-grow: 1; 
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            
            /* 數字樣式設定 */
            color: white;
            font-size: 80px;
            font-weight: bold;
            -webkit-text-stroke: 3px black;
            padding-top: 20px;

            /* 預設閉嘴背景 */
            background-image: url('imgs/p.png');
            background-position: bottom center;
            background-size: contain;
            background-repeat: no-repeat;
            cursor: pointer;
        }

        /* [x] 新贈文字 div 背景圖片 用 id 設定 imgs/op.png */
        #p.open {
            background-image: url('imgs/op.png');
        }
    </style>
</head>

<body>
    <div class="container">
        <img class="title" src="imgs/popcat.svg" alt="POPCAT">
        
        <div class="cat-img" id="p">0</div>
    </div>

    <script>
        const cat = document.getElementById('p');
        let count = 0;

        // [x] 音效功能清單：載入 1-4 號音效檔案進入陣列
        const popAudios = [
            new Audio('pops/pop1.mp3'),
            new Audio('pops/pop2.mp3'),
            new Audio('pops/pop3.mp3'),
            new Audio('pops/pop4.mp3')
        ];

        // [x] 用 javascript 預載張嘴圖片 op.png
        const preloadImage = new Image();
        preloadImage.src = 'imgs/op.png';

        // [x] 寫一個 function: 計數器累加
        function pop() {
            count++;

            // [x] 在 console 下面，用 console.log(count) 去觀察 count 的變化
            console.log(count);

            // [x] 顯示計數器的數字
            cat.innerText = count;

            // [x] 當滑鼠按下，切換張嘴圖片 (透過新增 classList)
            cat.classList.add('open'); 

            // [x] 當滑鼠按下，輪流播放 pop1-4 的 mp3
            // 使用 (count - 1) % 4 來確保數字永遠在 0, 1, 2, 3 之間循環
            const audioIndex = (count - 1) % popAudios.length;
            const currentAudio = popAudios[audioIndex];
            
            currentAudio.currentTime = 0;
            currentAudio.play();
        }

        function unpop() {
            // [x] 細部功能清單：滑鼠放開後，等待 25 毫秒，再切回閉嘴圖片
            setTimeout(() => {
                // [x] 註冊滑鼠放開的事件，切換回 p.png (移除 classList)
                cat.classList.remove('open');
            }, 25);
        }

        // 事件註冊
        cat.addEventListener('mousedown', pop);
        cat.addEventListener('mouseup', unpop);
        cat.addEventListener('mouseleave', unpop);

        window.addEventListener('keydown', (e) => {
            if (!e.repeat) pop();
        });
        window.addEventListener('keyup', unpop);

        cat.addEventListener('touchstart', (e) => {
            e.preventDefault(); 
            pop();
        });
        cat.addEventListener('touchend', unpop);
    </script>
</body>
</html>
