<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>POPCAT CLASSIC</title>
    <style>
        /* [x] body box 編距為0 */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            /* [x] 字型 sans-serif */
            font-family: sans-serif;
        }

        .container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #bdaa90;
            /* [x] 防止文字被選取 */
            user-select: none;
            -webkit-user-select: none;
        }

        /* [x] 標題 box 最大寬度 600px */
        .title {
            width: 80%;
            max-width: 600px;
            margin-top: 2em;
        }

        /* [x] 文字 div 排版填滿剩餘空間 */
        /* [x] 文字 box 最大寬度 800px */
        .cat-img {
            flex-grow: 1; 
            width: 100%;
            max-width: 800px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            
            /* 數字樣式設定 */
            color: white;
            font-size: 80px;
            font-weight: bold;
            -webkit-text-stroke: 3px black;
            padding-top: 20px;

            /* 預設閉嘴背景 */
            background-image: url('imgs/p.png');
            background-position: bottom center;
            background-size: contain;
            background-repeat: no-repeat;
            cursor: pointer;
        }

        /* [x] 新贈文字 div 背景圖片 用 id 設定 imgs/op.png */
        /* 當 JavaScript 加入 .open 類別時觸發 */
        #p.open {
            background-image: url('imgs/op.png');
        }
    </style>
</head>

<body>
    <div class="container">
        <img class="title" src="imgs/popcat.svg" alt="POPCAT">
        
        <div class="cat-img" id="p">0</div>
    </div>

    <script>
        const cat = document.getElementById('p');
        let count = 0;

        function pop() {
            count++;
            cat.innerText = count;
            cat.classList.add('open'); // 增加 .open 類別以顯示 op.png
        }

        function unpop() {
            cat.classList.remove('open'); // 移除 .open 類別回到 p.png
        }

        // 滑鼠事件
        cat.addEventListener('mousedown', pop);
        cat.addEventListener('mouseup', unpop);
        cat.addEventListener('mouseleave', unpop);

        // 鍵盤事件
        window.addEventListener('keydown', (e) => {
            if (!e.repeat) pop();
        });
        window.addEventListener('keyup', unpop);

        // 手機觸控支援
        cat.addEventListener('touchstart', (e) => {
            e.preventDefault(); 
            pop();
        });
        cat.addEventListener('touchend', unpop);
    </script>
</body>
</html>
